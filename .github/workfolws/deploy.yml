name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
jobs:
  push-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add huggingface https://user:${HF_TOKEN}@https://huggingface.co/spaces/Hari-9544/food-recommendation-system
          git push huggingface main --force
